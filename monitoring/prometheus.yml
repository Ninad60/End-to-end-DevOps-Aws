global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the Node.js app's /metrics endpoint
  - job_name: '8byte-app'
    static_configs:
      - targets: ['app:3000']  # 'app' is the docker-compose service name
    metrics_path: /metrics

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape node-exporter for host metrics (CPU, memory, disk)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
